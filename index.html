<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Site</title>
</head>
<body>
  <h1>Hello</h1>
</body>

<script> 
 const now = new Date();
 const minute = now.getMinutes();
 const lastDigit = minute % 10;
 
 function redirect() {
    if (lastDigit % 2 === 1) {
      // 奇数の場合はGoogleにリダイレクト
      window.location.href = "https://www.google.com";
    } else {
      // 偶数の場合はYahooにリダイレクト
      window.location.href = "https://www.yahoo.co.jp";
    }
  }
  window.addEventListener("load", redirect);
</script>
</html>
